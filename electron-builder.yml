# electron-builder packaging config. Build pipeline:
#   electron-vite build   -> compiles main/preload/renderer into out/
#   electron-builder --win -> rebuilds native deps for Electron's ABI, packs out/
#                             into an asar, and produces an NSIS installer in dist/
#
# Native modules (node-pty) are patched (Spectre off, see patches/) by patch-package
# on `npm install`; electron-builder recompiles that already-patched source for the
# Electron ABI during pack. The .node binary is kept OUT of the asar via asarUnpack
# below so it can be require()'d at runtime.
appId: com.localhostworks.termhalla
productName: Termhalla
# Build resources (icon.ico, etc.) live here once added; Electron's default icon is
# used until then.
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
# The remote-agent bundle (feature 0022): the client provisions remote hosts with this artifact
# (version-locked to package.json — src/agent/version.ts inlines the same manifest version at
# build time). It rides OUTSIDE the asar under resources/agent/ so the provisioning stream can
# read it as a plain file (resolveAgentArtifactPath in src/main/remote/agent-artifact.ts).
extraResources:
  - from: out/agent/termhalla-agent.cjs
    to: agent/termhalla-agent.cjs
# node-pty ships a prebuilt/recompiled .node; native binaries cannot be loaded from
# inside an asar archive, so unpack the whole module to app.asar.unpacked/.
asarUnpack:
  - "**/node_modules/node-pty/**"
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/bindings/**"
  - "**/node_modules/file-uri-to-path/**"
win:
  target:
    - nsis   # the installer most users download
    - zip    # portable, no-install build — used by the Scoop manifest and anyone who wants
             # to unzip-and-run. Produces dist/Termhalla-<version>-win.zip.
  # Unsigned: internal distribution. Windows SmartScreen shows an "unknown publisher"
  # prompt on first run — expected. Add certificateFile/certificatePassword here to sign.
nsis:
  oneClick: false # show the wizard so the install dir is selectable
  perMachine: false # per-user install -> no UAC elevation prompt
  allowToChangeInstallationDirectory: true
  # Space-free, version-less artifact name so the local dist file, the uploaded GitHub asset, and
  # the name baked into latest.yml all agree. GitHub rewrites spaces in asset filenames, so the
  # default "Termhalla Setup X.Y.Z.exe" would upload as a munged name that latest.yml wouldn't match
  # — breaking the updater. The release workflow uploads dist/* directly (see release.yml), so the
  # on-disk name must already be the canonical one. Version omitted by request: every release ships
  # a "Termhalla-Setup.exe"; latest.yml (per release) still carries the real version for the updater.
  artifactName: ${productName}-Setup.${ext}
# GitHub Releases update feed. electron-builder bakes these coordinates into the bundled
# app-update.yml; electron-updater reads it to find latest.yml + the installer delta from
# the public repo's Releases (no runtime token needed). releaseType: release publishes a
# full (non-draft) release so a tag push goes live and auto-update flows immediately.
publish:
  provider: github
  owner: kmcculley
  repo: Termhalla
  releaseType: release
