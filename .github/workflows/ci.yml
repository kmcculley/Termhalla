name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      # npm ci runs postinstall -> patch-package, applying the node-pty Spectre patch.
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
